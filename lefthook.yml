pre-commit:
  commands:
    biome:
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
      glob: "*.{js,jsx,ts,tsx,json}"
    test-coverage:
      run: bash scripts/test-staged.sh {staged_files}
      glob: "src/**/*.{ts,tsx}"
    typecheck:
      run: bash scripts/typecheck-staged.sh {staged_files}
      glob: "src/**/*.test.{ts,tsx}"
    build:
      run: pnpm build
      glob: "src/**/*.{ts,tsx}"